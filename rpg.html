<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>RPG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif;}
canvas{display:block;}

#title{position:fixed;inset:0;z-index:200;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.tlogo{font-size:2.4em;font-weight:700;color:#ddd;margin-bottom:2px;}
.tsub{font-size:.72em;color:#555;margin-bottom:28px;}
.tlbl{font-size:.75em;color:#777;}
#ni{background:#222;border:1px solid #444;color:#ddd;font-family:inherit;font-size:1em;padding:8px 14px;width:200px;text-align:center;outline:none;border-radius:4px;margin-top:4px;}
#ni::placeholder{color:#555;}
.tbtn{margin-top:10px;padding:9px 36px;background:#333;border:1px solid #555;border-radius:4px;color:#ddd;font-family:inherit;font-size:.9em;cursor:pointer;}
.tbtn:hover{background:#444;}
.tctrl{margin-top:24px;font-size:.67em;color:#444;line-height:2.2;text-align:center;border-top:1px solid #2a2a2a;padding-top:16px;width:280px;}
.tctrl b{color:#666;}

#hud{position:fixed;top:14px;left:14px;display:none;flex-direction:column;gap:5px;background:rgba(0,0,0,.7);border-radius:8px;padding:12px 16px;min-width:200px;border:1px solid rgba(255,255,255,.08);}
.hname{font-size:.82em;font-weight:700;color:#fff;letter-spacing:1px;margin-bottom:2px;}
.hlv{display:inline-block;background:#e74c3c;color:#fff;font-size:.58em;font-weight:700;padding:1px 7px;border-radius:3px;margin-left:5px;}
.brow{display:flex;align-items:center;gap:6px;}
.blbl{font-size:.62em;color:#aaa;width:24px;}
.btrk{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.bfil{height:100%;border-radius:4px;transition:width .3s;}
.bhp{background:linear-gradient(90deg,#8b0000,#e74c3c);}
.bmp{background:linear-gradient(90deg,#00308b,#5dade2);}
.bep{background:linear-gradient(90deg,#1a6b2a,#2ecc71);}
.batk{background:linear-gradient(90deg,#8b6000,#f1c40f);}
.bnum{font-size:.6em;color:#888;min-width:52px;text-align:right;}
.hinfo{display:flex;gap:12px;margin-top:4px;font-size:.7em;color:#aaa;}
.hinfo span{color:#f1c40f;font-weight:700;}

#ebars{position:fixed;inset:0;pointer-events:none;}
.ebar{position:absolute;width:110px;pointer-events:none;transform:translateX(-50%);}
.ename{font-size:.66em;color:#fff;text-align:center;text-shadow:0 0 6px #000,1px 1px 2px #000;white-space:nowrap;}
.etrack{height:6px;background:rgba(0,0,0,.6);border-radius:3px;overflow:hidden;margin-top:2px;border:1px solid rgba(255,255,255,.1);}
.efill{height:100%;background:linear-gradient(90deg,#8b0000,#e74c3c);border-radius:3px;transition:width .15s;}

#dlayer{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.flt{position:absolute;font-weight:900;pointer-events:none;text-shadow:1px 1px 4px #000,0 0 8px #000;transform:translateX(-50%);white-space:nowrap;animation:fly 1.1s ease forwards;}
@keyframes fly{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-70px)}}

#hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:8px 20px;font-size:.82em;color:#f1c40f;font-weight:700;display:none;pointer-events:none;letter-spacing:1px;}

#shop{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.82);align-items:center;justify-content:center;}
.sbox{background:#0c0c1c;border:1px solid #2a2a4a;border-radius:10px;padding:26px 34px;min-width:360px;}
.stit{color:#f1c40f;font-size:1.05em;font-weight:700;letter-spacing:2px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #222;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 8px;border:1px solid #1a1a3a;border-radius:5px;margin-bottom:6px;}
.srow span:first-child{color:#d0d0e0;font-size:.86em;}
.sbtn{background:none;border:1px solid #4a3a00;border-radius:4px;color:#f1c40f;font-family:inherit;font-size:.76em;padding:5px 14px;cursor:pointer;}
.sbtn:hover{background:rgba(241,196,15,.12);}
#smsg{color:#2ecc71;font-size:.78em;margin-top:8px;min-height:18px;}
.sclose{margin-top:10px;padding:9px 28px;background:none;border:1px solid #333;border-radius:4px;color:#666;font-family:inherit;font-size:.82em;cursor:pointer;}
.sclose:hover{border-color:#888;color:#aaa;}

#overlay{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.92);align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;}
#overlay.show{display:flex;}
.oico{font-size:3.5em;}
.otit{font-size:2em;font-weight:900;letter-spacing:4px;}
.odsc{font-size:.86em;color:#888;line-height:1.8;}
.ostat{font-size:.86em;color:#ddd;background:#111;border:1px solid #222;border-radius:8px;padding:12px 26px;line-height:2.2;}
.obtn{background:none;border:1px solid currentColor;border-radius:6px;font-family:inherit;font-size:.9em;padding:12px 34px;cursor:pointer;letter-spacing:2px;}
.obtn:hover{background:rgba(255,255,255,.08);}

#ctrl{position:fixed;bottom:14px;right:14px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 14px;font-size:.68em;color:#555;line-height:2.1;pointer-events:none;}
#ctrl b{color:#888;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="title">
  <div class="tlogo">RPG</div>
  <div class="tsub">3D</div>
  <div class="tlbl">이름</div>
  <input id="ni" type="text" placeholder="이름 입력" maxlength="8">
  <button class="tbtn" onclick="startGame()">▶ 시작</button>
  <div class="tctrl"><b>WASD</b> / 방향키 이동 &nbsp;·&nbsp; <b>Space/F</b> 공격<br><b>Q</b> 포션 사용 &nbsp;·&nbsp; <b>E</b> 상점 (상인 근처)</div>
</div>

<div id="hud">
  <div class="hname"><span id="hname">용사</span><span class="hlv" id="hlv">Lv.1</span></div>
  <div class="brow"><span class="blbl">HP</span><div class="btrk"><div class="bfil bhp" id="bhp" style="width:100%"></div></div><span class="bnum" id="nhp">100/100</span></div>
  <div class="brow"><span class="blbl">MP</span><div class="btrk"><div class="bfil bmp" id="bmp" style="width:100%"></div></div><span class="bnum" id="nmp">30/30</span></div>
  <div class="brow"><span class="blbl">EXP</span><div class="btrk"><div class="bfil bep" id="bep" style="width:0%"></div></div><span class="bnum" id="nep">0/50</span></div>
  <div class="brow"><span class="blbl">⚔</span><div class="btrk"><div class="bfil batk" id="batkcd" style="width:100%"></div></div><span class="bnum" id="hgold" style="color:#f1c40f">50G</span></div>
  <div class="hinfo">ATK <span id="hatk">15</span> · 🧪<span id="hpot">0</span> · 💰<span id="hg">50</span>G</div>
</div>

<div id="ebars"></div>
<div id="dlayer"></div>
<div id="hint">[ E ] 상점 열기</div>

<div id="shop">
  <div class="sbox">
    <div class="stit">⚔ 상점</div>
    <div id="slist"></div>
    <div id="smsg"></div>
    <button class="sclose" onclick="closeShop()">닫기 [ E ]</button>
  </div>
</div>

<div id="overlay">
  <div class="oico" id="oico"></div>
  <div class="otit" id="otit"></div>
  <div class="odsc" id="odsc"></div>
  <div class="ostat" id="ostat"></div>
  <button class="obtn" id="obtn"></button>
</div>

<div id="ctrl"><b>WASD</b> 이동 · <b>Space/F</b> 공격<br><b>Q</b> 포션 · <b>E</b> 상점</div>

<script>
/* ══ RENDERER ══════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 25, 60);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
window.addEventListener('resize', ()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

/* ══ LIGHTS ════════════════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const sun = new THREE.DirectionalLight(0xffd080, 1.2);
sun.position.set(10,20,10); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5; sun.shadow.camera.far=80;
sun.shadow.camera.left=-30; sun.shadow.camera.right=30;
sun.shadow.camera.top=30; sun.shadow.camera.bottom=-30;
scene.add(sun);

/* ══ HELPERS ═══════════════════════════════════════════════ */
const rand  = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rnd   = (a,b)=>Math.random()*(b-a)+a;
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));

function addMesh(geo,col,x,y,z,cast=true,recv=true){
  const m = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:col,shininess:20}));
  m.position.set(x,y,z); m.castShadow=cast; m.receiveShadow=recv;
  scene.add(m); return m;
}
const BOX=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const SPH=(r,s=8)=>new THREE.SphereGeometry(r,s,s);
const CYL=(a,b,h,s=8)=>new THREE.CylinderGeometry(a,b,h,s);

/* ══ MAP ═══════════════════════════════════════════════════ */
const obstacles=[]; // {x,z,r}

// Ground
addMesh(BOX(80,.2,80),0x3a8a2a,0,-.1,0,false,true);
// Plaza
addMesh(BOX(14,.15,14),0x888880,0,.02,0,false,true);
// Paths
addMesh(BOX(3,.14,50),0x999988,0,.02,0,false,true);
addMesh(BOX(50,.14,3),0x999988,0,.02,0,false,true);

// Fountain
(()=>{
  addMesh(CYL(2,2,.4,16),0x888888,0,.2,0);
  addMesh(CYL(2,2,.2,16),0xaaaaaa,0,.5,0);
  addMesh(CYL(.15,.15,1.5,8),0x999999,0,.85,0);
  const top=new THREE.Mesh(SPH(.4),new THREE.MeshPhongMaterial({color:0x88ccff,shininess:100}));
  top.position.set(0,1.65,0); scene.add(top);
  obstacles.push({x:0,z:0,r:2.3});
})();

// Buildings
function house(x,z,w,d,h,c,rc){
  addMesh(BOX(w,h,d),c,x,h/2,z);
  addMesh(BOX(w+.3,.35,d+.3),rc,x,h+.17,z);
  obstacles.push({x,z,r:Math.max(w,d)*.65});
}
house(-9,-9,4,3.5,3.2,0xcc9966,0x8b4513);
house( 9,-9,3.5,3,3.0,0xbbaa88,0x7a3a10);
house(-9, 9,4,4,3.5,0xccbb99,0x8b4513);
house( 9, 9,3.5,3.5,2.8,0xbb9977,0x7a3010);

// Castle (back)
(()=>{
  addMesh(BOX(16,10,6),0x888888,0,5,-27);
  [[-6,-27],[6,-27]].forEach(([x,z])=>{
    addMesh(BOX(2.5,14,2.5),0x888888,x,7,z);
    const roof=new THREE.Mesh(new THREE.ConeGeometry(2,2.5,8),new THREE.MeshPhongMaterial({color:0x8b1a1a}));
    roof.position.set(x,14.5,z); scene.add(roof);
  });
  obstacles.push({x:0,z:-27,r:9});
})();

// Lamp posts
function lamp(x,z){
  addMesh(CYL(.06,.06,3,6),0x444444,x,1.5,z);
  const g=new THREE.Mesh(SPH(.2),new THREE.MeshPhongMaterial({color:0xffffcc,emissive:0xffff88,emissiveIntensity:.5}));
  g.position.set(x,3.2,z); scene.add(g);
  const pl=new THREE.PointLight(0xffffa0,.8,8); pl.position.set(x,3,z); scene.add(pl);
}
[[-5,-5],[-5,5],[5,-5],[5,5],[0,7],[0,-7],[-7,0],[7,0]].forEach(([x,z])=>lamp(x,z));

// Trees
function tree(x,z,s=1){
  addMesh(CYL(.2*s,.25*s,1.5*s),0x5c3a1e,x,.75*s,z);
  addMesh(SPH(.85*s),0x2d8a2d,x,2.1*s,z);
  addMesh(SPH(.65*s),0x267a26,x+.3*s,2.6*s,z-.2*s);
  obstacles.push({x,z,r:.5*s});
}
for(let i=0;i<55;i++){
  const a=Math.random()*Math.PI*2, d=9+Math.random()*21;
  const x=Math.cos(a)*d, z=Math.sin(a)*d;
  if(Math.abs(x)<3.5||Math.abs(z)<28) continue;
  tree(x,z,.8+Math.random()*.5);
}

// Ruins (east)
[[22,6],[24,2],[22,-4],[26,-6]].forEach(([x,z])=>{
  const h=rnd(1.2,3); addMesh(BOX(1.5,h,1.5),0x888880,x,h/2,z);
  obstacles.push({x,z,r:.9});
});

// Merchant NPC position
const MERCHANT_POS = new THREE.Vector3(-6, 0, -3);

// Merchant model (colored humanoid)
function buildNPC(col){
  const g=new THREE.Group();
  const add=(m,x,y,z)=>{m.position.set(x,y,z);m.castShadow=true;g.add(m);return m;};
  add(new THREE.Mesh(BOX(.46,.46,.46),new THREE.MeshPhongMaterial({color:0xffcc99})),0,1.53,0);
  add(new THREE.Mesh(BOX(.48,.18,.48),new THREE.MeshPhongMaterial({color:0x553300})),0,1.82,0);
  add(new THREE.Mesh(BOX(.6,.68,.28),new THREE.MeshPhongMaterial({color:col})),0,.94,0);
  add(new THREE.Mesh(BOX(.2,.58,.2),new THREE.MeshPhongMaterial({color:col})),-.4,.92,0);
  add(new THREE.Mesh(BOX(.2,.58,.2),new THREE.MeshPhongMaterial({color:col})),.4,.92,0);
  add(new THREE.Mesh(BOX(.23,.62,.23),new THREE.MeshPhongMaterial({color:0x553300})),-.15,0,0);
  add(new THREE.Mesh(BOX(.23,.62,.23),new THREE.MeshPhongMaterial({color:0x553300})),.15,0,0);
  g.position.set(MERCHANT_POS.x,.41,MERCHANT_POS.z);
  scene.add(g); return g;
}
const merchantNPC = buildNPC(0xcc7722);
merchantNPC.rotation.y = Math.PI*.3;

// Merchant sign
(()=>{
  addMesh(BOX(.1,2,.1),0x5c3a1e,MERCHANT_POS.x+.7,.41+1,MERCHANT_POS.z-.3);
  addMesh(BOX(1.2,.5,.06),0xddaa44,MERCHANT_POS.x+.7,.41+2.2,MERCHANT_POS.z-.3);
})();

/* ══ PLAYER MODEL ══════════════════════════════════════════ */
function buildPlayer(){
  const g=new THREE.Group();
  const add=(m,x,y,z)=>{m.position.set(x,y,z);m.castShadow=true;g.add(m);return m;};
  const M=c=>new THREE.MeshPhongMaterial({color:c,shininess:20});

  const head=add(new THREE.Mesh(BOX(.46,.46,.46),M(0xffcc99)),0,1.53,0);
  add(new THREE.Mesh(BOX(.48,.18,.48),M(0x332200)),0,1.82,0);
  [-0.13,.13].forEach(x=>add(new THREE.Mesh(BOX(.09,.09,.04),M(0x111111)),x,1.54,.24));
  add(new THREE.Mesh(BOX(.16,.04,.04),M(0x662222)),0,1.43,.24);
  add(new THREE.Mesh(BOX(.6,.68,.28),M(0x2255aa)),0,.94,0);
  add(new THREE.Mesh(BOX(.62,.1,.3),M(0x553300)),0,.62,0);
  const aL=add(new THREE.Mesh(BOX(.2,.58,.2),M(0x2255aa)),-.4,.92,0);
  const aR=add(new THREE.Mesh(BOX(.2,.58,.2),M(0x2255aa)),.4,.92,0);
  add(new THREE.Mesh(BOX(.2,.2,.2),M(0xffcc99)),-.4,.6,0);
  add(new THREE.Mesh(BOX(.2,.2,.2),M(0xffcc99)),.4,.6,0);
  const lL=add(new THREE.Mesh(BOX(.23,.62,.23),M(0x1a3a7a)),-.15,0,0);
  const lR=add(new THREE.Mesh(BOX(.23,.62,.23),M(0x1a3a7a)),.15,0,0);
  add(new THREE.Mesh(BOX(.25,.14,.28),M(0x221100)),-.15,-.38,.03);
  add(new THREE.Mesh(BOX(.25,.14,.28),M(0x221100)),.15,-.38,.03);
  // Sword
  add(new THREE.Mesh(BOX(.08,.32,.08),M(0x886633)),.41,.52,0);
  add(new THREE.Mesh(BOX(.26,.06,.1),M(0x666666)),.41,.67,0);
  add(new THREE.Mesh(BOX(.06,.82,.04),M(0xdddddd)),.41,.12,0);

  g.position.y=.41;
  return {group:g,head,aL,aR,lL,lR};
}

/* ══ ENEMY DATA ═════════════════════════════════════════════ */
const ETYPES=[
  {name:"슬라임",   icon:"🟢",color:0x33cc55,hp:30, atk:6,  exp:15, gold:8,  spd:2.0,size:.8, arange:1.3,acd:1.5,slime:true},
  {name:"고블린",   icon:"👺",color:0x44aa22,hp:55, atk:13, exp:30, gold:18, spd:2.8,size:.88,arange:1.5,acd:1.3},
  {name:"좀비",     icon:"🧟",color:0x556655,hp:80, atk:18, exp:50, gold:26, spd:1.8,size:.9, arange:1.4,acd:1.8},
  {name:"해골",     icon:"💀",color:0xddd5c0,hp:105,atk:25, exp:68, gold:36, spd:2.3,size:.88,arange:1.5,acd:1.2},
  {name:"오크",     icon:"👹",color:0x7a5a28,hp:155,atk:37, exp:105,gold:56, spd:2.1,size:1.2,arange:1.8,acd:1.6},
  {name:"다크나이트",icon:"🗡",color:0x1a1a2a,hp:230,atk:55, exp:170,gold:85, spd:2.9,size:1.1,arange:1.6,acd:1.1},
];

// Spawn zones  [cx, cz, radius, type indices]
const ZONES=[
  [15,0,8,[0,1]],[-15,0,8,[0,1]],[0,15,8,[1,2]],[0,-15,8,[1,2]],
  [20,20,7,[2,3]],[-20,20,7,[2,3]],[20,-20,7,[3,4]],[-20,-20,7,[4,5]],
];

/* ══ ENEMY MODEL ════════════════════════════════════════════ */
function buildEnemyModel(et){
  const g=new THREE.Group();
  const M=c=>new THREE.MeshPhongMaterial({color:c,shininess:15});
  const add=(m,x,y,z)=>{m.position.set(x,y,z);m.castShadow=true;g.add(m);return m;};

  if(et.slime){
    const b=new THREE.Mesh(SPH(.62),M(et.color)); b.scale.y=.62; b.position.y=.44; g.add(b);
    [-0.22,.22].forEach(x=>{const e=new THREE.Mesh(SPH(.1),M(0x003300));e.position.set(x,.58,.56);g.add(e);});
  } else {
    const c=et.color;
    add(new THREE.Mesh(BOX(.44,.44,.44),M(c)),0,1.5,0);
    add(new THREE.Mesh(BOX(.55,.65,.3),M(c)),0,.85,0);
    const al=add(new THREE.Mesh(BOX(.2,.55,.2),M(c)),-.38,.85,0);
    const ar=add(new THREE.Mesh(BOX(.2,.55,.2),M(c)),.38,.85,0);
    const ll=add(new THREE.Mesh(BOX(.22,.6,.22),M(c)),-.14,0,0);
    const lr=add(new THREE.Mesh(BOX(.22,.6,.22),M(c)),.14,0,0);
    g._al=al; g._ar=ar; g._ll=ll; g._lr=lr;
  }
  g.scale.setScalar(et.size);
  g.position.y=.08;
  return g;
}

/* ══ ENEMY HP BAR ═══════════════════════════════════════════ */
class EBar{
  constructor(en){
    this.en=en;
    this.el=document.createElement('div');
    this.el.className='ebar';
    this.el.innerHTML=`<div class="ename">${en.et.icon} ${en.et.name}</div><div class="etrack"><div class="efill" style="width:100%"></div></div>`;
    document.getElementById('ebars').appendChild(this.el);
    this.fill=this.el.querySelector('.efill');
  }
  update(){
    const p=this.en.pos.clone().add(new THREE.Vector3(0,this.en.et.size*2.8,0));
    const v=p.clone().project(camera);
    if(v.z>=1||v.z<-1){this.el.style.display='none';return;}
    const sx=(v.x+1)/2*innerWidth, sy=(-v.y+1)/2*innerHeight;
    if(sx<-80||sx>innerWidth+80||sy<0||sy>innerHeight+40){this.el.style.display='none';return;}
    this.el.style.display='block';
    this.el.style.left=sx+'px'; this.el.style.top=sy+'px';
    this.fill.style.width=Math.max(0,this.en.hp/this.en.maxHp*100)+'%';
  }
  remove(){this.el.remove();}
}

/* ══ ENEMY CLASS ════════════════════════════════════════════ */
class Enemy{
  constructor(tidx,x,z){
    this.tidx=tidx; this.et=ETYPES[tidx];
    this.hp=this.et.hp; this.maxHp=this.et.hp;
    this.pos=new THREE.Vector3(x,0,z);
    this.rot=Math.random()*Math.PI*2;
    this.atkCd=0; this.atkAnim=0;
    this.wTimer=0; this.wDir=new THREE.Vector3(1,0,0);
    this.alive=true;
    this.model=buildEnemyModel(this.et);
    this.bar=new EBar(this);
    scene.add(this.model);
  }
  update(dt,ppos){
    if(!this.alive) return;
    const dist=this.pos.distanceTo(ppos);
    this.atkCd=Math.max(0,this.atkCd-dt);
    this.atkAnim=Math.max(0,this.atkAnim-dt);

    // AI
    if(dist<this.et.arange && this.atkCd<=0){
      this.atkCd=this.et.acd; this.atkAnim=.25;
      doEnemyAtk(this);
    }
    if(dist<this.et.arange+8 && dist>this.et.arange){
      const dir=new THREE.Vector3().subVectors(ppos,this.pos).setY(0).normalize();
      this.rot=Math.atan2(dir.x,dir.z);
      const np=this.pos.clone().addScaledVector(dir,this.et.spd*dt);
      if(!obsCollide(np,.35)) this.pos.copy(np);
    } else if(dist>=this.et.arange+8){
      this.wTimer-=dt;
      if(this.wTimer<=0){const a=rnd(0,Math.PI*2);this.wDir.set(Math.sin(a),0,Math.cos(a));this.wTimer=rnd(1.5,3.5);this.rot=a;}
      const np=this.pos.clone().addScaledVector(this.wDir,this.et.spd*.35*dt);
      np.clampScalar(-28,28); if(!obsCollide(np,.35)) this.pos.copy(np);
    }

    // Walk anim
    if(this.model._al){
      const spd=dist<this.et.arange+8?1:.3;
      const wt=elapsed*5*spd;
      this.model._al.rotation.x=Math.sin(wt)*.4;
      this.model._ar.rotation.x=-Math.sin(wt)*.4;
      this.model._ll.rotation.x=-Math.sin(wt)*.4;
      this.model._lr.rotation.x=Math.sin(wt)*.4;
    }

    // Lunge anim
    if(this.atkAnim>0){
      const t=1-this.atkAnim/.25;
      const dir=new THREE.Vector3().subVectors(ppos,this.pos).setY(0).normalize();
      this.model.position.copy(this.pos).addScaledVector(dir,Math.sin(t*Math.PI)*.4);
    } else {
      this.model.position.copy(this.pos);
    }
    this.model.rotation.y=this.rot;
    this.bar.update();
  }
  hit(dmg){
    this.hp-=dmg;
    this.bar.update();
    if(this.hp<=0){this.die();return true;}
    return false;
  }
  die(){
    this.alive=false;
    scene.remove(this.model);
    this.bar.remove();
    gainExp(this.et.exp);
    P.gold+=this.et.gold;
    floatAt(this.pos.clone().add(new THREE.Vector3(0,1.5,0)),'+'+this.et.gold+'G','#f1c40f');
    updateHUD();
    enemies=enemies.filter(e=>e.alive);
    setTimeout(()=>spawnOne(this.tidx),5000+rand(0,5000));
  }
}

/* ══ PLAYER ════════════════════════════════════════════════ */
let P={};
let PM=null; // player model parts

function initP(name){
  P={name,level:1,hp:100,maxHp:100,mp:30,maxMp:30,atk:15,exp:0,gold:50,
     weapon:null,inventory:{},atkCd:0,iframeCd:0,atkAnim:0,rot:0};
}
function totalAtk(){return P.atk+(P.weapon==='강철검'?12:P.weapon==='불꽃검'?25:P.weapon==='전설검'?50:0);}
function expNeeded(){return P.level*50;}

function initPModel(){
  if(PM) scene.remove(PM.group);
  PM=buildPlayer();
  PM.group.position.set(0,.41,2);
  scene.add(PM.group);
}

// Attack range ring
const atkRing=new THREE.Mesh(
  new THREE.RingGeometry(2.3,2.5,32),
  new THREE.MeshBasicMaterial({color:0xff3333,transparent:true,opacity:.2,side:THREE.DoubleSide,depthWrite:false})
);
atkRing.rotation.x=-Math.PI/2; atkRing.position.y=.06;
scene.add(atkRing); atkRing.visible=false;

/* ══ INPUT ══════════════════════════════════════════════════ */
const keys={};
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(e.key===' '){e.preventDefault(); if(gameOn&&!shopOpen) doAtk();}
  if(k==='f'&&gameOn&&!shopOpen) doAtk();
  if(k==='q'&&gameOn) usePotion();
  if(k==='e'&&gameOn) toggleShop();
});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

/* ══ COLLISION ══════════════════════════════════════════════ */
function obsCollide(pos,r=.5){
  if(Math.abs(pos.x)>29||Math.abs(pos.z)>29) return true;
  for(const o of obstacles){const dx=pos.x-o.x,dz=pos.z-o.z;if(dx*dx+dz*dz<(o.r+r)*(o.r+r))return true;}
  return false;
}

/* ══ COMBAT ═════════════════════════════════════════════════ */
let enemies=[];

function doAtk(){
  if(P.atkCd>0||!gameOn) return;
  P.atkCd=.65; P.atkAnim=.28;
  // Flash ring
  atkRing.material.opacity=.6;
  setTimeout(()=>atkRing.material.opacity=.2,180);

  let hit=false;
  const pp=PM.group.position;
  enemies.forEach(en=>{
    if(!en.alive) return;
    if(en.pos.distanceTo(pp)<2.5){
      const dmg=Math.max(1,totalAtk()+rand(-3,3));
      floatAt(en.pos.clone().add(new THREE.Vector3(rand(-1,1)*0,2,0)),'-'+dmg,'#e74c3c',1.1);
      en.hit(dmg); hit=true;
    }
  });
  if(!hit) floatAt(pp.clone().add(new THREE.Vector3(0,2.5,0)),'miss','#888',.8);
}

function doEnemyAtk(en){
  if(P.iframeCd>0) return;
  const dmg=Math.max(1,en.et.atk+rand(-3,3));
  P.hp=Math.max(0,P.hp-dmg);
  P.iframeCd=.55;
  floatAt(PM.group.position.clone().add(new THREE.Vector3(rnd(-.5,.5),2.5,rnd(-.5,.5))),'-'+dmg,'#ff4444',1.2);
  updateHUD();
  if(P.hp<=0) gameOver();
}

function gainExp(a){
  P.exp+=a;
  while(P.exp>=expNeeded()){
    P.exp-=expNeeded(); P.level++;
    P.maxHp+=25;P.hp=P.maxHp;P.maxMp+=8;P.mp=P.maxMp;P.atk+=6;
    floatAt(PM.group.position.clone().add(new THREE.Vector3(0,3.5,0)),'LEVEL UP!','#f1c40f',1.5);
  }
  updateHUD();
}

function usePotion(){
  if(P.inventory['영약']>0){P.hp=P.maxHp;P.mp=P.maxMp;P.inventory['영약']--;floatAt(PM.group.position.clone().add(new THREE.Vector3(0,2.5,0)),'+HP+MP','#2ecc71',1.2);updateHUD();return;}
  if(P.inventory['포션']>0){P.hp=Math.min(P.maxHp,P.hp+50);P.inventory['포션']--;floatAt(PM.group.position.clone().add(new THREE.Vector3(0,2.5,0)),'+50 HP','#2ecc71',1.2);updateHUD();}
}

/* ══ SPAWN ══════════════════════════════════════════════════ */
const MAX_EN=16;
function spawnOne(tidx){
  if(enemies.length>=MAX_EN) return;
  const z=ZONES[rand(0,ZONES.length-1)];
  const a=rnd(0,Math.PI*2),r=rnd(0,z[2]);
  const en=new Enemy(tidx??z[3][rand(0,z[3].length-1)], z[0]+Math.cos(a)*r, z[1]+Math.sin(a)*r);
  enemies.push(en);
}
function initialSpawn(){
  for(let i=0;i<12;i++){
    const z=ZONES[i%ZONES.length];
    const tid=z[3][rand(0,z[3].length-1)];
    const a=rnd(0,Math.PI*2),r=rnd(2,z[2]);
    enemies.push(new Enemy(tid, z[0]+Math.cos(a)*r, z[1]+Math.sin(a)*r));
  }
}

/* ══ FLOAT TEXT ═════════════════════════════════════════════ */
function floatAt(wpos,txt,col,scale=1){
  const el=document.createElement('div');
  el.className='flt'; el.textContent=txt;
  el.style.color=col; el.style.fontSize=(scale*1.2)+'em';
  document.getElementById('dlayer').appendChild(el);
  let t=0;
  const fn=()=>{
    t+=.016;
    const v=wpos.clone().add(new THREE.Vector3(0,t*1.5,0)).project(camera);
    if(v.z<1){
      el.style.left=((v.x+1)/2*innerWidth)+'px';
      el.style.top=((-v.y+1)/2*innerHeight)+'px';
    }
    if(t<1.1) requestAnimationFrame(fn); else el.remove();
  };
  requestAnimationFrame(fn);
}

/* ══ HUD ════════════════════════════════════════════════════ */
function updateHUD(){
  if(!gameOn) return;
  document.getElementById('hname').textContent=P.name;
  document.getElementById('hlv').textContent='Lv.'+P.level;
  document.getElementById('hg').textContent=P.gold;
  document.getElementById('hgold').textContent=P.gold+'G';
  document.getElementById('hatk').textContent=totalAtk();
  document.getElementById('hpot').textContent=(P.inventory['포션']||0)+(P.inventory['영약']||0);
  const hp=clamp(P.hp/P.maxHp*100,0,100);
  const mp=clamp(P.mp/P.maxMp*100,0,100);
  const ep=P.exp/expNeeded()*100;
  document.getElementById('bhp').style.width=hp+'%';
  document.getElementById('bmp').style.width=mp+'%';
  document.getElementById('bep').style.width=ep+'%';
  document.getElementById('nhp').textContent=P.hp+'/'+P.maxHp;
  document.getElementById('nmp').textContent=P.mp+'/'+P.maxMp;
  document.getElementById('nep').textContent=P.exp+'/'+expNeeded();
}

/* ══ SHOP ═══════════════════════════════════════════════════ */
let shopOpen=false;
const SITEMS=[
  {name:'체력 포션',key:'포션',  price:25,icon:'🧪',desc:'HP +50 회복'},
  {name:'만능 영약',key:'영약',  price:80,icon:'✨',desc:'HP·MP 완전 회복'},
  {name:'강철 검',  key:'강철검',price:70,icon:'⚔', desc:'ATK +12',wpn:true},
  {name:'불꽃 검',  key:'불꽃검',price:150,icon:'🔥',desc:'ATK +25',wpn:true},
  {name:'전설의 검',key:'전설검',price:500,icon:'⚡',desc:'ATK +50',wpn:true},
];
function toggleShop(){
  const near=PM&&PM.group.position.distanceTo(MERCHANT_POS)<4.5;
  if(!shopOpen&&!near){floatAt(PM.group.position.clone().add(new THREE.Vector3(0,3,0)),'상인에게 가까이!','#f1c40f',.85);return;}
  shopOpen?closeShop():openShop();
}
function openShop(){
  shopOpen=true;
  const list=document.getElementById('slist');
  list.innerHTML='';
  SITEMS.forEach(it=>{
    const eq=P.weapon===it.key?' (장착중)':'';
    const d=document.createElement('div'); d.className='srow';
    d.innerHTML=`<span>${it.icon} ${it.name}${eq}</span><span style="color:#f1c40f">${it.price}G</span><button class="sbtn" onclick="buyItem('${it.key}',${it.price},${!!it.wpn})">구매</button>`;
    list.appendChild(d);
  });
  document.getElementById('smsg').textContent='';
  document.getElementById('shop').style.display='flex';
}
function closeShop(){shopOpen=false;document.getElementById('shop').style.display='none';}
function buyItem(key,price,wpn){
  if(P.gold<price){document.getElementById('smsg').textContent='골드 부족!';return;}
  P.gold-=price;
  if(wpn) P.weapon=key;
  else P.inventory[key]=(P.inventory[key]||0)+1;
  document.getElementById('smsg').textContent=(SITEMS.find(i=>i.key===key)?.name||key)+' 구매!';
  updateHUD(); openShop();
}

/* ══ OVERLAY ════════════════════════════════════════════════ */
function showOv(ico,tit,dsc,stat,btn,col,cb){
  document.getElementById('oico').textContent=ico;
  document.getElementById('otit').textContent=tit;
  document.getElementById('odsc').innerHTML=dsc;
  document.getElementById('ostat').innerHTML=stat;
  const b=document.getElementById('obtn');
  b.textContent=btn; b.style.color=col; b.onclick=cb;
  document.getElementById('overlay').classList.add('show');
}
function gameOver(){
  gameOn=false;
  showOv('😵','GAME OVER',`<b>${P.name}</b>은(는) 쓰러졌다...`,`Lv.<b>${P.level}</b> · 골드 <b>${P.gold}G</b>`,'처음부터','#e74c3c',()=>location.reload());
}

/* ══ CAMERA ═════════════════════════════════════════════════ */
const camCur=new THREE.Vector3(0,8,12);
const camLook=new THREE.Vector3();

/* ══ GAME LOOP ══════════════════════════════════════════════ */
let elapsed=0, gameOn=false;
const clock=new THREE.Clock();

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  elapsed+=dt;

  // Merchant idle bob
  merchantNPC.position.y=.41+Math.sin(elapsed*1.2)*.04;

  if(!gameOn){renderer.render(scene,camera);return;}

  // Cooldowns
  P.atkCd=Math.max(0,P.atkCd-dt);
  P.iframeCd=Math.max(0,P.iframeCd-dt);
  P.atkAnim=Math.max(0,P.atkAnim-dt);

  // ATK cooldown bar
  document.getElementById('batkcd').style.width=(1-P.atkCd/.65)*100+'%';

  // Movement
  const moving=movePlayer(dt);

  // Player animation
  const wt=elapsed*7*(moving?1:0);
  PM.aL.rotation.x=Math.sin(wt)*.45;
  PM.aR.rotation.x=-Math.sin(wt)*.45;
  PM.lL.rotation.x=-Math.sin(wt)*.45;
  PM.lR.rotation.x=Math.sin(wt)*.45;
  if(!moving) PM.group.position.y=.41+Math.sin(elapsed*1.5)*.025;
  if(P.atkAnim>0){const t=1-P.atkAnim/.28;PM.aR.rotation.x=Math.sin(t*Math.PI)*-1.7;}

  // Attack ring follows player
  atkRing.position.x=PM.group.position.x;
  atkRing.position.z=PM.group.position.z;

  // Enemies
  const pp=PM.group.position;
  enemies.forEach(en=>en.update(dt,pp));

  // Merchant hint
  const nearMerchant=pp.distanceTo(MERCHANT_POS)<4.5;
  document.getElementById('hint').style.display=nearMerchant&&!shopOpen?'block':'none';

  // Camera follow
  const offX=-Math.sin(P.rot)*8, offZ=-Math.cos(P.rot)*8;
  camCur.lerp(new THREE.Vector3(pp.x+offX, pp.y+6, pp.z+offZ),.08);
  camera.position.copy(camCur);
  camLook.lerp(new THREE.Vector3(pp.x,pp.y+1,pp.z),.1);
  camera.lookAt(camLook);

  renderer.render(scene,camera);
}

function movePlayer(dt){
  if(shopOpen) return false;
  let moved=false;
  if(keys['a']||keys['arrowleft']){P.rot+=2.5*dt;moved=true;}
  if(keys['d']||keys['arrowright']){P.rot-=2.5*dt;moved=true;}
  let mz=0;
  if(keys['w']||keys['arrowup']) mz=-1;
  if(keys['s']||keys['arrowdown']) mz=1;
  if(mz!==0){
    const spd=mz<0?P.spd||5.5:3.3;
    const dx=Math.sin(P.rot)*spd*dt*(-mz);
    const dz=Math.cos(P.rot)*spd*dt*(-mz);
    const np=PM.group.position.clone().add(new THREE.Vector3(dx,0,dz));
    if(!obsCollide(np,.5)) PM.group.position.copy(np);
    moved=true;
  }
  PM.group.rotation.y=P.rot;
  return moved;
}

/* ══ START ══════════════════════════════════════════════════ */
function startGame(){
  const name=document.getElementById('ni').value.trim()||'용사';
  document.getElementById('title').style.display='none';
  document.getElementById('hud').style.display='flex';
  atkRing.visible=true;
  initP(name); P.spd=5.5;
  initPModel();
  initialSpawn();
  gameOn=true;
  clock.start(); updateHUD();
}
document.getElementById('ni').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});

loop();
</script>
